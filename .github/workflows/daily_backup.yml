name: Tu dong Backup Supabase

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kiem tra ma nguon
        uses: actions/checkout@v4

      - name: Thiet lap Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cai dat thu vien
        run: pip install supabase

      - name: Chay file Backup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          ls -la
          python backup.py

      - name: Luu file CSV vao GitHub
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add backup_data/
          git commit -m "Backup $(date +'%Y-%m-%d %H:%M UTC')" || echo "Khong co gi thay doi"
          git push
